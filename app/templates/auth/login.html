{% extends "base.html" %}
{% block title %}Sign In — SplitVice{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-8">

  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
    <p class="text-sm text-gray-500 mt-1">Sign in to your SplitVice account</p>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
        <input type="email" name="email" value="{{ email or '' }}" required
          autocomplete="email"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                 transition-shadow" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
        <input type="password" name="password" required
          autocomplete="current-password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                 transition-shadow" />
      </div>

      <button type="submit"
        class="w-full bg-indigo-600 text-white rounded-lg px-4 py-2.5 text-sm font-semibold
               hover:bg-indigo-700 transition-colors mt-2">
        Sign in
      </button>

    </form>
  </div>

  <p class="text-center text-sm text-gray-500 mt-5">
    Don't have an account?
    <a href="/register" class="text-indigo-600 font-medium hover:underline">Create one free</a>
  </p>

</div>
{% endblock %}
