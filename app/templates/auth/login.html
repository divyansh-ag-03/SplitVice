<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — SplitVice</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    (function() {
      const s = localStorage.getItem('theme');
      if (s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.classList.add('dark');
    })();
  </script>
  <style>* { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 flex items-center justify-center p-4">

<div class="w-full max-w-sm">

  <!-- Logo -->
  <div class="flex items-center justify-center gap-2.5 mb-8">
    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-sm"
         style="--tw-gradient-from:#6366f1;--tw-gradient-to:#4338ca">
      <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <span class="text-xl font-bold text-gray-900 dark:text-white tracking-tight">SplitVice</span>
  </div>

  <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-xl shadow-gray-200/50 dark:shadow-none p-8">

    <div class="mb-6">
      <h1 class="text-xl font-bold text-gray-900 dark:text-white">Welcome back</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Sign in to your account</p>
    </div>

    {% if error %}
    <div class="flex items-center gap-2.5 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800
                text-red-700 dark:text-red-400 text-sm rounded-xl px-4 py-3 mb-5">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">

      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Email</label>
        <input type="email" name="email" value="{{ email or '' }}" required autocomplete="email"
          class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                 rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow" />
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Password</label>
        <input type="password" name="password" required autocomplete="current-password"
          class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                 rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow" />
      </div>

      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm
               py-3 rounded-xl transition-colors shadow-sm mt-2">
        Sign in
      </button>

    </form>
  </div>

  <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-5">
    Don't have an account?
    <a href="/register" class="text-indigo-600 dark:text-indigo-400 font-semibold hover:underline">Create one free</a>
  </p>

</div>
</body>
</html>
