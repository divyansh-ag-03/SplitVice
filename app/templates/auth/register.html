{% extends "base.html" %}
{% block title %}Create Account — SplitVice{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-8">

  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Create your account</h1>
    <p class="text-sm text-gray-500 mt-1">Free forever. No credit card needed.</p>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/register" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Full name</label>
        <input type="text" name="name" value="{{ name or '' }}" required
          autocomplete="name"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                 transition-shadow" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
        <input type="email" name="email" value="{{ email or '' }}" required
          autocomplete="email"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                 transition-shadow" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
        <input type="password" name="password" required minlength="8"
          autocomplete="new-password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                 transition-shadow" />
        <p class="text-xs text-gray-400 mt-1">At least 8 characters</p>
      </div>

      <button type="submit"
        class="w-full bg-indigo-600 text-white rounded-lg px-4 py-2.5 text-sm font-semibold
               hover:bg-indigo-700 transition-colors mt-2">
        Create account
      </button>

    </form>
  </div>

  <p class="text-center text-sm text-gray-500 mt-5">
    Already have an account?
    <a href="/login" class="text-indigo-600 font-medium hover:underline">Sign in</a>
  </p>

</div>
{% endblock %}
