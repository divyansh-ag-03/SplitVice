<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SplitVice{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <a href="{% if current_user %}/dashboard{% else %}/{% endif %}"
        class="text-lg font-bold text-indigo-600 tracking-tight">
        SplitVice
      </a>
      <div class="flex items-center gap-4 text-sm">
        {% if current_user %}
          <span class="text-gray-500 hidden sm:inline">{{ current_user.name }}</span>
          <a href="/dashboard" class="text-gray-600 hover:text-indigo-600 transition-colors">Dashboard</a>
          <form method="post" action="/logout">
            <button type="submit"
              class="text-gray-500 hover:text-red-600 transition-colors">
              Sign out
            </button>
          </form>
        {% else %}
          <a href="/login" class="text-gray-600 hover:text-indigo-600 transition-colors">Sign in</a>
          <a href="/register"
            class="bg-indigo-600 text-white text-sm px-4 py-1.5 rounded-lg
                   hover:bg-indigo-700 transition-colors font-medium">
            Get started
          </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Flash message -->
  {% if flash %}
  <div class="max-w-5xl mx-auto w-full px-4 sm:px-6 mt-4">
    <div class="px-4 py-3 rounded-lg text-sm font-medium
      {% if flash_type == 'error' %}bg-red-50 text-red-700 border border-red-200
      {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
      {{ flash }}
    </div>
  </div>
  {% endif %}

  <!-- Main content -->
  <main class="flex-1 max-w-5xl mx-auto w-full px-4 sm:px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-100 mt-auto">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 text-xs text-gray-400 text-center">
      SplitVice · Built with FastAPI, HTMX &amp; TailwindCSS
    </div>
  </footer>

</body>
</html>
