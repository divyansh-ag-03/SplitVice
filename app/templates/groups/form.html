{% extends "base.html" %}
{% block title %}New Group — SplitVice{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">

  <div class="mb-6">
    <a href="/dashboard" class="text-sm text-indigo-600 hover:underline">← Dashboard</a>
    <h1 class="text-xl font-bold text-gray-900 mt-2">Create a group</h1>
    <p class="text-sm text-gray-500 mt-0.5">Invite friends and start splitting expenses.</p>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/groups" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Group name</label>
        <input type="text" name="name" value="{{ name or '' }}" required
          placeholder="e.g. Goa Trip, Flatmates, Office Lunch"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                 transition-shadow" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">
          Description
          <span class="text-gray-400 font-normal">(optional)</span>
        </label>
        <textarea name="description" rows="2"
          placeholder="What's this group for?"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                 transition-shadow resize-none">{{ description or '' }}</textarea>
      </div>

      <div class="flex gap-3 pt-1">
        <button type="submit"
          class="flex-1 bg-indigo-600 text-white rounded-lg px-4 py-2.5 text-sm font-semibold
                 hover:bg-indigo-700 transition-colors">
          Create group
        </button>
        <a href="/dashboard"
          class="flex-1 text-center border border-gray-300 rounded-lg px-4 py-2.5 text-sm
                 font-medium text-gray-600 hover:bg-gray-50 transition-colors">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
