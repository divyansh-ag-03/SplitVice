{% extends "base.html" %}
{% block title %}Settle Up — SplitVice{% endblock %}

{% block page_header %}
<div class="flex items-center gap-2">
  <a href="/groups/{{ group.id }}" class="text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
  </a>
  <span class="text-gray-300 dark:text-gray-600">/</span>
  <span class="text-xs text-gray-500 dark:text-gray-400 truncate">{{ group.name }}</span>
  <span class="text-gray-300 dark:text-gray-600">/</span>
  <h1 class="text-base font-semibold text-gray-900 dark:text-white">Settle up</h1>
</div>
{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">

  <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-card overflow-hidden">
    <div class="px-6 py-5 border-b border-gray-100 dark:border-gray-800">
      <h2 class="text-sm font-semibold text-gray-900 dark:text-white">Record a payment</h2>
      <p class="text-xs text-gray-400 dark:text-gray-500 mt-0.5">Mark a payment between two members</p>
    </div>

    <div class="p-6">
      {% if error %}
      <div class="flex items-center gap-2.5 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800
                  text-red-700 dark:text-red-400 text-sm rounded-xl px-4 py-3 mb-5">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/groups/{{ group.id }}/settlements" class="space-y-4">

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Who paid</label>
            <select name="payer_id" required
              class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                     rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white
                     focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
              {% for m in members %}
              <option value="{{ m.user_id }}">{{ m.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Who received</label>
            <select name="payee_id" required
              class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                     rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white
                     focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
              {% for m in members %}
              <option value="{{ m.user_id }}">{{ m.name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Amount</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-bold text-gray-400 pointer-events-none">₹</span>
              <input type="number" name="amount" step="0.01" min="0.01" required placeholder="0.00"
                class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                       rounded-xl pl-9 pr-4 py-3 text-sm font-semibold text-gray-900 dark:text-white
                       focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-shadow" />
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Date</label>
            <input type="date" name="settlement_date" value="{{ today }}" required
              class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                     rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white
                     focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-shadow" />
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">
            Note <span class="text-gray-300 dark:text-gray-600 font-normal normal-case">(optional)</span>
          </label>
          <input type="text" name="description" placeholder="e.g. Paid via UPI, Cash"
            class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                   rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white placeholder-gray-400
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-shadow" />
        </div>

        <div class="flex gap-3 pt-1">
          <button type="submit"
            class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm
                   py-3 rounded-xl transition-colors shadow-sm">
            Record settlement
          </button>
          <a href="/groups/{{ group.id }}"
            class="flex-1 text-center bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700
                   text-gray-700 dark:text-gray-300 font-semibold text-sm py-3 rounded-xl transition-colors">
            Cancel
          </a>
        </div>

      </form>
    </div>
  </div>
</div>
{% endblock %}
