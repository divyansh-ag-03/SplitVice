{% extends "base.html" %}
{% block title %}Settle Up — SplitVice{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">

  <div class="mb-6">
    <a href="/groups/{{ group.id }}" class="text-sm text-indigo-600 hover:underline">← {{ group.name }}</a>
    <h1 class="text-xl font-bold text-gray-900 mt-2">Record a settlement</h1>
    <p class="text-sm text-gray-500 mt-0.5">Mark a payment between two members.</p>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/groups/{{ group.id }}/settlements" class="space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Who paid</label>
          <select name="payer_id" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                   bg-white">
            {% for m in members %}
            <option value="{{ m.user_id }}">{{ m.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Who received</label>
          <select name="payee_id" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                   bg-white">
            {% for m in members %}
            <option value="{{ m.user_id }}">{{ m.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Amount</label>
          <input type="number" name="amount" step="0.01" min="0.01" required
            placeholder="0.00"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Date</label>
          <input type="date" name="settlement_date" value="{{ today }}" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">
          Note
          <span class="text-gray-400 font-normal">(optional)</span>
        </label>
        <input type="text" name="description" placeholder="e.g. Paid via UPI"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
      </div>

      <div class="flex gap-3 pt-1">
        <button type="submit"
          class="flex-1 bg-emerald-600 text-white rounded-lg px-4 py-2.5 text-sm font-semibold
                 hover:bg-emerald-700 transition-colors">
          Record settlement
        </button>
        <a href="/groups/{{ group.id }}"
          class="flex-1 text-center border border-gray-300 rounded-lg px-4 py-2.5 text-sm
                 font-medium text-gray-600 hover:bg-gray-50 transition-colors">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
